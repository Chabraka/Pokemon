name: Deploy to GitHub Pages

# Met à jour la branche `gh-pages` avec le contenu de `dist` (build Vite).
# Sur GitHub : Settings → Pages → Source = **Deploy from a branch** → **gh-pages** / **/(root)**.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify production output
        run: |
          test -f dist/index.html
          if grep -q 'src/main.jsx' dist/index.html; then
            echo 'ERREUR: dist/index.html ressemble au mode dev.'
            exit 1
          fi
          if ! grep -q '/Pokemon/assets/' dist/index.html; then
            echo 'ERREUR: bundle /Pokemon/assets/ introuvable (base Vite).'
            exit 1
          fi

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
